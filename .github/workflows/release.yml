name: Release

# Currently version-only: opens "Version Packages" PRs and writes CHANGELOGs
# via Changesets. Does NOT publish to any registry.
#
# External publishing is deferred because the `@poeticui` npm scope doesn't
# match any existing GitHub org — GitHub Packages requires scope-to-owner
# alignment, and the repo lives under `artificialpoets/`. Three possible
# resolutions when/if external publishing becomes necessary:
#
#   A. Create a `poeticui` GitHub org and move this repo there.
#   B. Rename packages to `@artificialpoets/*` across the codebase.
#   C. Publish to a non-GitHub registry (private npm, Verdaccio, etc.).
#
# Until that decision is made, consumers (today: only the AP monorepo at
# artificialpoets/monorepo) pull this repo in as a git submodule at
# `vendor/poeticui/` and Bun's workspace resolution handles the rest.
#
# To re-enable publishing: add `publish: bun run release` to the
# changesets/action `with:` block, restore the `packages: write` permission,
# and ensure the publish target (org/scope) is ready.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version (open Version Packages PR; no publish)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required so Changesets can create version-bump PRs on this branch.
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      # Changesets — version-only mode.
      # If there are unreleased .changeset/*.md files on main, opens/updates
      # a "Version Packages" PR that bumps versions + writes CHANGELOGs.
      # Merging that PR applies the bumps on main (but still doesn't publish
      # anywhere — see the file-level comment above for the deferral rationale).
      - name: Create/Update Version Packages PR
        uses: changesets/action@v1
        with:
          version: bun run version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
