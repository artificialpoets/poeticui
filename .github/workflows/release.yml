name: Release

# Publishes `@poeticui/*` to public npm (https://registry.npmjs.org) and
# manages versioning via Changesets. On push to `main`:
#
#   - If there are pending `.changeset/*.md` entries → opens or updates a
#     "Version Packages" PR that bumps versions + writes CHANGELOG.md.
#   - If there are no pending changesets AND local versions are ahead of
#     the registry → publishes them.
#
# Authentication: NPM_TOKEN repository secret (npm Automation token, scoped
# to @poeticui:write). Added via GitHub UI → Settings → Secrets → Actions.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Create Version Packages PR or publish to npm
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
