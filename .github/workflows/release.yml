name: Release

# Publishes `@artificialpoets/*` to public npm (https://registry.npmjs.org).
# Uses Changesets to open Version Packages PRs (for non-initial releases).
# Falls back to explicit `npm publish` per package, because Changesets' built-in
# publish has been observed to silently no-op in some bun + npm interop
# scenarios (logs "success" without producing any actual npm publish output).
#
# Authentication: NPM_TOKEN repository secret (Automation token, or Granular
# Access Token with @artificialpoets scope + Bypass 2FA enabled).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node + npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          scope: "@artificialpoets"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "Authenticated as: $(npm whoami)"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Open Version Packages PR (Changesets) — only when changesets exist
        uses: changesets/action@v1
        with:
          version: bun run version
          # No `publish:` key here — explicit npm publish step below handles it.
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish unpublished packages explicitly via npm
        run: |
          set -e
          PUBLISHED=""
          for pkg in tokens components content poeticui; do
            PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name")
            VERSION=$(node -p "require('./packages/$pkg/package.json').version")
            # curl URL — npm registry path is the literal package name (works for scoped + unscoped)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/${PKG_NAME}/$VERSION")
            if [ "$STATUS" = "404" ]; then
              echo "→ Publishing ${PKG_NAME}@$VERSION (registry HTTP $STATUS — not yet published)"
              (cd packages/$pkg && npm publish --access=public)
              PUBLISHED="$PUBLISHED ${PKG_NAME}@$VERSION"
            else
              echo "→ Skip ${PKG_NAME}@$VERSION (registry HTTP $STATUS — already published)"
            fi
          done
          if [ -n "$PUBLISHED" ]; then
            echo "Published:$PUBLISHED"
          else
            echo "No new packages to publish."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deprecate @artificialpoets/poeticui (renamed to "poeticui")
        # Idempotent — npm just no-ops if the package is already deprecated with the same message.
        # Safe to run every release.
        run: |
          npm deprecate "@artificialpoets/poeticui@*" \
            "This package has been renamed. Install 'poeticui' instead: bun add poeticui" \
            || echo "(deprecation skipped — package may not exist or token lacks scope)"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
