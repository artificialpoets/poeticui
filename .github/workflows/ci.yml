name: CI — Poetic UI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  boundary:
    name: Enforce neutral-boundary contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ─── Rule 1: @poeticui/components never imports @ap/brand ─────────
      - name: No @ap/brand imports in @poeticui/components
        run: |
          if grep -rE "from ['\"]@ap/brand" packages/components/src/; then
            echo "::error::@ap/brand imported inside @poeticui/components — violates the neutral-boundary contract."
            echo "Arrows only point downward: apps/* → @ap/brand → @poeticui/components → @poeticui/tokens."
            exit 1
          fi
          echo "✓ @poeticui/components is @ap/brand-free"

      # ─── Rule 2: @poeticui/components never imports next/* ────────────
      - name: No next/* imports in @poeticui/components
        run: |
          if grep -rE "from ['\"]next(/|['\"])" packages/components/src/; then
            echo "::error::next/* imported inside @poeticui/components — violates the framework-agnostic contract."
            exit 1
          fi
          echo "✓ @poeticui/components is Next.js-free"

      # ─── Rule 3: @poeticui/components package.json never depends on @ap/brand ──
      - name: @poeticui/components package.json has no @ap/brand dep
        run: |
          if grep -E "\"@ap/brand\"" packages/components/package.json; then
            echo "::error::@ap/brand listed as a dep of @poeticui/components — the neutral package must not depend on brand."
            exit 1
          fi
          echo "✓ @poeticui/components has no @ap/brand dep"

      # ─── Rule 4: @poeticui/tokens never references @ap/* ───────────────
      - name: @poeticui/tokens is zero-dep
        run: |
          if grep -rE "from ['\"]@ap/" packages/tokens/src/; then
            echo "::error::@poeticui/tokens references @ap/*. Tokens must be pure CSS with zero deps."
            exit 1
          fi
          echo "✓ @poeticui/tokens is zero-dep"

      # ─── Rule 5: @poeticui/content has no @ap/* references ─────────────
      - name: No @ap/* imports in @poeticui/content
        run: |
          if grep -rE "from ['\"]@ap/" packages/content/src/; then
            echo "::error::@poeticui/content references @ap/*. Content primitives must stay neutral."
            exit 1
          fi
          echo "✓ @poeticui/content is @ap/*-free"

      # ─── Rule 6: @poeticui/content never imports next/* ───────────────
      - name: No next/* imports in @poeticui/content
        run: |
          if grep -rE "from ['\"]next(/|['\"])" packages/content/src/; then
            echo "::error::next/* imported inside @poeticui/content — violates the framework-agnostic contract."
            exit 1
          fi
          echo "✓ @poeticui/content is Next.js-free"

      # ─── Standard checks: lint + test across the workspace ────────────
      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Storybook build (smoke test)
        run: bun run storybook:build
