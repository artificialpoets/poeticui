name: CI — Poetic UI

# Lint + test + Storybook build for all three packages.
#
# The neutral-boundary contract (no @ap/brand imports, no next/*, no @ap/*
# in tokens/content) is enforced by ESLint config in each package
# (.eslintrc.js → no-restricted-imports). `bun run lint` below runs that
# config and fails CI on any violation. We previously had redundant grep
# rules here that were stricter than ESLint (they didn't honor the
# allowlist for legacy components like Link + Avatar that still depend on
# next/* — DES-49 follow-up). Removed in favor of trusting the lint step.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint + test + storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (enforces neutral-boundary rules + style)
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Storybook build (smoke test)
        run: bun run storybook:build

      - name: Anti-hallucination conventions (CONTRIBUTING §9)
        run: |
          set -e
          echo "→ Checking that any file with throw new Error() also includes the [@poeticui/components/...] prefix"
          UNPREFIXED=""
          while IFS= read -r f; do
            if ! grep -q "\[@poeticui/components/" "$f"; then
              UNPREFIXED="$UNPREFIXED$f"$'\n'
            fi
          done < <(grep -rl "throw new Error(" packages/components/src --include='*.tsx' --include='*.ts' 2>/dev/null || true)
          if [ -n "$UNPREFIXED" ]; then
            echo "FAIL: files with throw new Error() but no [@poeticui/components/...] prefix — see CONTRIBUTING §9.3:"
            echo "$UNPREFIXED"
            exit 1
          fi
          echo "OK: every throw new Error() lives in a file that contains the [@poeticui/components/...] prefix"

          echo "→ Checking that primitives have a JSDoc @example block (warn-only until AP-503 sweep completes)"
          MISSING=""
          while IFS= read -r f; do
            if ! grep -q "@example" "$f"; then
              MISSING="$MISSING$f"$'\n'
            fi
          done < <(find packages/components/src -name "*.tsx" ! -name "*.stories.tsx" ! -path "*/__tests__/*" 2>/dev/null)
          if [ -n "$MISSING" ]; then
            COUNT=$(echo -n "$MISSING" | grep -c '^')
            echo "WARN: $COUNT component file(s) missing @example block (tracked by AP-503)"
          else
            echo "OK: every component has @example"
          fi
